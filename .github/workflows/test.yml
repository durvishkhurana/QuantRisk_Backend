name: Backend tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: quantrisk
          POSTGRES_PASSWORD: password
          POSTGRES_DB: quantrisk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quantrisk -d quantrisk_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYTHONPATH: .
      JWT_SECRET_KEY: pytest-ci-jwt-secret
      DATABASE_URL: postgresql+asyncpg://quantrisk:password@localhost:5432/quantrisk_test
      REDIS_URL: redis://localhost:6379/15
      CELERY_BROKER_URL: redis://localhost:6379/15
      CELERY_RESULT_BACKEND: redis://localhost:6379/15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python -m alembic upgrade head

      - name: Run tests
        run: |
          python -m pytest -q tests/test_var_engine.py tests/test_risk_engine.py
          python -m pytest -q tests/test_api.py::test_register_creates_user_and_token
          python -m pytest -q tests/test_api.py::test_task_status_persists_in_redis
