services:
  - type: web
    name: quantrisk-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_HOURS
        value: "24"
      - key: RISK_COMPUTE_INTERVAL_SECONDS
        value: "60"
      - key: LOOKBACK_DAYS
        value: "252"
      - key: VAR_CONFIDENCE_95
        value: "0.05"
      - key: VAR_CONFIDENCE_99
        value: "0.01"
      - key: MARGIN_WARNING_THRESHOLD
        value: "0.85"
      - key: METRICS_PORT
        value: "9090"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: quantrisk-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: quantrisk-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: quantrisk-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: quantrisk-redis
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false

  - type: worker
    name: quantrisk-celery-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.celery_app.celery_app worker --loglevel=info --concurrency=2
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quantrisk-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: quantrisk-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: quantrisk-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: quantrisk-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        fromService:
          type: web
          name: quantrisk-backend
          envVarKey: JWT_SECRET_KEY

  - type: worker
    name: quantrisk-celery-beat
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.celery_app.celery_app beat --loglevel=info
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quantrisk-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: quantrisk-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: quantrisk-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: quantrisk-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        fromService:
          type: web
          name: quantrisk-backend
          envVarKey: JWT_SECRET_KEY

  - type: redis
    name: quantrisk-redis
    plan: starter
    ipAllowList: []

databases:
  - name: quantrisk-postgres
    databaseName: quantrisk_db
    user: quantrisk
    plan: starter
